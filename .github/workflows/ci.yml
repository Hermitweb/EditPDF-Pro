name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install PyMuPDF PyQt5 PyQt-Fluent-Widgets Pillow pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build:
    needs: test
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install PyMuPDF PyQt5 PyQt-Fluent-Widgets Pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "EditPDF-Pro" `
            --hidden-import PyQt5 --hidden-import fitz `
            --hidden-import qfluentwidgets --hidden-import PIL `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EditPDF-Pro
          path: dist/EditPDF-Pro.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EditPDF-Pro.exe
