name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          python -m pip install --upgrade pip
          pip install PyMuPDF
          pip install PyQt5
          pip install PyQt-Fluent-Widgets
          pip install Pillow
          pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -m pytest tests/test_pdf_engine.py -v --tb=short

  build:
    needs: test
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          python -m pip install --upgrade pip
          pip install PyMuPDF
          pip install PyQt5
          pip install PyQt-Fluent-Widgets
          pip install Pillow
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name EditPDF-Pro --distpath dist --clean --noconfirm --add-data=res/;res --add-data=src/app;app --add-data=src/core;core --add-data=src/ui;ui --add-data=src/utils;utils --hidden-import PyQt5 --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets --hidden-import fitz --hidden-import pymupdf --hidden-import qfluentwidgets --hidden-import PIL src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EditPDF-Pro
          path: dist/EditPDF-Pro.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EditPDF-Pro.exe
